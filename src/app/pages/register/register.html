<!-- ✅ register.component.html -->
<section class="register">
  <div class="register-box">
    <div class="register-grid">
      <div class="register-image">
        <h1>¡Intenta Social Balance!</h1>
        <img src="register.png" alt="Registro" />
      </div>
      <form (ngSubmit)="onSubmit(registerForm)" #registerForm="ngForm" class="register-form">
        <h2>Registro</h2>
        <div class="form-group">
          <input type="text" name="username" ngModel placeholder="Nombre de Usuario" required #username="ngModel" />
          <div class="error" *ngIf="username.invalid && username.touched">Campo obligatorio</div>
        </div>
        <div class="form-group">
          <input type="text" name="fullname" ngModel placeholder="Nombre Completo" required #fullname="ngModel" />
          <div class="error" *ngIf="fullname.invalid && fullname.touched">Campo obligatorio</div>
        </div>
        <div class="form-group">
          <input type="email" name="email" ngModel placeholder="Correo Electrónico" required #email="ngModel" />
          <div class="error" *ngIf="email.invalid && email.touched">Correo inválido</div>
        </div>
        <div class="form-group">
          <input type="tel" name="phone" ngModel placeholder="Número de Teléfono" required #phone="ngModel" />
          <div class="error" *ngIf="phone.invalid && phone.touched">Campo obligatorio</div>
        </div>
        <div class="form-group">
          <input type="text" name="university" ngModel placeholder="Universidad" required #university="ngModel" />
          <div class="error" *ngIf="university.invalid && university.touched">Campo obligatorio</div>
        </div>
        <div class="form-group checkbox">
          <label>
            <input type="checkbox" name="terms" ngModel required />
            He leído y acepto los Términos y Condiciones.
          </label>
        </div>
        <button type="submit" [disabled]="registerForm.invalid">Crear cuenta</button>
      </form>
    </div>
  </div>
</section>
